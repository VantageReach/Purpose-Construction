<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <!-- Brand red background -->
  <rect width="64" height="64" rx="10" fill="#C41C35"/>

  <!-- House mark drawn from logo: diagonal rafter → peak → right wall → bracket base -->
  <!-- This mirrors the angular construction house outline in the Purpose Roofing & Construction logo -->
  <path
    d="M10 50 L32 11 L54 23"
    stroke="white"
    stroke-width="5.5"
    stroke-linecap="round"
    stroke-linejoin="round"
    fill="none"
  />
  <path
    d="M54 23 L54 53 L40 53"
    stroke="white"
    stroke-width="5.5"
    stroke-linecap="round"
    stroke-linejoin="round"
    fill="none"
  />
  <!-- Short chimney / structural post extending from peak — echoes logo detail -->
  <line x1="32" y1="11" x2="32" y2="3" stroke="white" stroke-width="5.5" stroke-linecap="round"/>
</svg>
